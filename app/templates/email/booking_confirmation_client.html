{% extends "_layout.html" %}
{% block content %}
  <h2 style="color:#f5f5f5;margin-bottom:12px;">Booking Confirmed ✅</h2>
  <p style="color:#999;line-height:1.6;">Your appointment has been successfully booked.</p>
  <div style="background:#222;border-radius:12px;padding:20px;margin:24px 0;">
    <p style="margin:0 0 8px;color:#e8b84b;font-weight:700;">📍 {{ salon_name }}</p>
    <p style="margin:0 0 8px;color:#f5f5f5;">✂️ Service: <b>{{ service_name }}</b></p>
    <p style="margin:0;color:#f5f5f5;">🕐 Time: <b>{{ time_str }}</b></p>
  </div>
  <p style="color:#666;font-size:13px;">Payment is collected at the salon. Please arrive 5 minutes early.</p>
{% endblock %}
