services:
  # 1. Redis (Message Broker for Celery & Cache)
  # Bound to loopback only: dev workflow is unchanged (other containers reach it
  # via the compose network as `redis:6379`), but if this compose is ever brought
  # up on a cloud VM, Redis (no auth) is NOT exposed to the public internet.
  redis:
    image: redis:7-alpine
    container_name: barbershop-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  # 2. Elasticsearch (Log Storage)
  # Loopback-only for the same reason — `xpack.security.enabled=false` means no
  # auth at all; never let port 9200 face the public internet.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: barbershop-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  # 3. FastAPI App (Core API + RAG Chatbot)
  # Built once here; worker/beat/flower reuse the same image via `image:` below
  app:
    build: .
    image: barbershop-backend
    container_name: barbershop-api
    command: bash ./entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - ELASTIC_HOST=elasticsearch
      - SENTENCE_TRANSFORMERS_HOME=/model_cache
    depends_on:
      - redis
      - elasticsearch
    volumes:
      - .:/app
      - chroma_data:/app/rag_core/chroma_data
      - model_cache:/model_cache
    restart: always

  # 4. Celery Worker — reuses the same image as app (no separate build)
  worker:
    image: barbershop-backend
    container_name: barbershop-worker
    command: python3 -m celery -A app.celery_app:celery_app worker --loglevel=info -Q email_queue,image_queue,celery
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # 5. Celery Beat — reuses the same image as app
  beat:
    image: barbershop-backend
    container_name: barbershop-beat
    command: python3 -m celery -A app.celery_app:celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # 6. Flower — reuses the same image as app
  # Loopback-only: Flower has full visibility into task arguments and no auth in
  # dev. Reach it at http://localhost:5555 from your own machine.
  flower:
    image: barbershop-backend
    container_name: barbershop-flower
    command: python3 -m celery -A app.celery_app:celery_app flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # 7. Redis Commander (Redis Cache GUI)
  # Loopback-only — no auth, exposes all Redis contents.
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: barbershop-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    restart: always

  # 8. Frontend (Next.js App)
  frontend:
    build:
      context: ./frontend
    container_name: barbershop-frontend
    command: sh -c "pnpm install --frozen-lockfile --config.confirmModulesPurge=false && pnpm dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL_INTERNAL=http://app:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - app
    restart: always

volumes:
  es_data:
  frontend_node_modules:
  frontend_next:
  chroma_data:
  model_cache:
