services:
  # 1. Redis (Message Broker for Celery & Cache)
  redis:
    image: redis:7-alpine
    container_name: barbershop-redis
    ports:
      - "6379:6379"
    restart: always

  # 2. Elasticsearch (Log Storage)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: barbershop-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  # 3. FastAPI App (Core API + RAG Chatbot)
  app:
    build: .
    container_name: barbershop-api
    command: bash ./entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - ELASTIC_HOST=elasticsearch
      # BGE-M3 model cache path (persisted in named volume)
      - SENTENCE_TRANSFORMERS_HOME=/model_cache
    depends_on:
      - redis
      - elasticsearch
    volumes:
      - .:/app
      # ChromaDB vector store — persists across container restarts/rebuilds
      - chroma_data:/app/rag_core/chroma_data
      # BGE-M3 model weights (~2GB) — download once, reuse forever
      - model_cache:/model_cache
    restart: always

  # 4. Celery Worker (Email sending, Image compression)
  worker:
    build: .
    container_name: barbershop-worker
    command: python3 -m celery -A app.celery_app:celery_app worker --loglevel=info -Q email_queue,image_queue,celery
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # 5. Celery Beat (Appointment Reminders)
  beat:
    build: .
    container_name: barbershop-beat
    command: python3 -m celery -A app.celery_app:celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # 6. Flower (Celery Monitoring)
  flower:
    build: .
    container_name: barbershop-flower
    command: python3 -m celery -A app.celery_app:celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # 7. Redis Commander (Redis Cache GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: barbershop-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: always

  # 8. Frontend (Next.js App)
  frontend:
    build:
      context: ./frontend
    container_name: barbershop-frontend
    command: sh -c "pnpm install && pnpm dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - app
    restart: always

volumes:
  es_data:
  frontend_node_modules:
  frontend_next:
  # RAG volumes — data persists across container restarts
  chroma_data:
  model_cache:
