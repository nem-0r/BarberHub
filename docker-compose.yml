services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: barbershop-postgres
    environment:
      - POSTGRES_USER=barberhub
      - POSTGRES_PASSWORD=barberhub
      - POSTGRES_DB=barberhub
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberhub -d barberhub"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  # Redis — Celery broker + cache
  redis:
    image: redis:7-alpine
    container_name: barbershop-redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  # Elasticsearch — log storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: barbershop-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  # FastAPI app
  app:
    build: .
    image: barbershop-backend
    container_name: barbershop-api
    command: bash ./entrypoint.sh
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://barberhub:barberhub@postgres:5432/barberhub}
      - RAG_BACKEND=${RAG_BACKEND:-pgvector}
      - REDIS_HOST=redis
      - ELASTIC_HOST=elasticsearch
      - SENTENCE_TRANSFORMERS_HOME=/model_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    volumes:
      - .:/app
      - chroma_data:/app/rag_core/chroma_data
      - model_cache:/model_cache
    restart: always

  # Celery worker
  worker:
    image: barbershop-backend
    container_name: barbershop-worker
    command: python3 -m celery -A app.celery_app:celery_app worker --loglevel=info -Q email_queue,image_queue,celery
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://barberhub:barberhub@postgres:5432/barberhub}
      - RAG_BACKEND=${RAG_BACKEND:-pgvector}
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # Celery beat
  beat:
    image: barbershop-backend
    container_name: barbershop-beat
    command: python3 -m celery -A app.celery_app:celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://barberhub:barberhub@postgres:5432/barberhub}
      - RAG_BACKEND=${RAG_BACKEND:-pgvector}
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # Flower — Celery monitoring UI
  flower:
    image: barbershop-backend
    container_name: barbershop-flower
    command: python3 -m celery -A app.celery_app:celery_app flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      - app
    volumes:
      - .:/app
    restart: always

  # Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: barbershop-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    restart: always

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
    container_name: barbershop-frontend
    command: sh -c "pnpm install --frozen-lockfile --config.confirmModulesPurge=false && pnpm dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL_INTERNAL=http://app:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - app
    restart: always

volumes:
  pg_data:
  es_data:
  frontend_node_modules:
  frontend_next:
  chroma_data:
  model_cache:
